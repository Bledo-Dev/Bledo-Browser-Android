name: bledo
description: A privacy-focused browser for Android.
version: 1.0.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.0.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  url_launcher: ^6.2.1
  local_auth: ^2.1.7
  cupertino_icons: ^1.0.6
  path: ^1.9.0
  permission_handler: ^11.3.1
  dio: ^5.4.1
  open_file: ^3.3.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  app_links: ^7.1.1
  window_manager: ^0.4.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
